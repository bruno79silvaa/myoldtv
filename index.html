<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYOLDTV — 80s TV Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --text-green: #00ff44;
    --text-yellow: #ffdd00;
    --text-amber: #ffaa00;
    --led-off: #1a0a0a;
    --led-on: #00ff44;
    --wall-bg: #1a0e06;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    background: var(--wall-bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'VT323', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Wallpaper texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,180,80,0.04) 39px, rgba(255,180,80,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,180,80,0.04) 39px, rgba(255,180,80,0.04) 40px);
    pointer-events: none;
    z-index: 0;
  }

  /* Keyboard hints */
  #keyboard-hints {
    position: fixed;
    top: 18px;
    right: 22px;
    font-family: 'VT323', monospace;
    font-size: 15px;
    color: rgba(255, 180, 80, 0.5);
    line-height: 1.7;
    text-align: right;
    z-index: 10;
    pointer-events: none;
  }

  /* Power hint */
  #power-hint {
    position: fixed;
    bottom: 55px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: rgba(255, 180, 80, 0.45);
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
    animation: hintPulse 2s ease-in-out infinite;
    white-space: nowrap;
  }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.45; }
    50% { opacity: 0.85; }
  }

  /* Ambient glow */
  #ambient-glow {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 45%, rgba(30, 100, 180, 0.2) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #ambient-glow.active { opacity: 1; }

  /* TV scene wrapper */
  .scene {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: tvAppear 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes tvAppear {
    from { transform: scale(0.88); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  /* ── TV CONTAINER ─────────────────────────────────────────────────
     The TV.png is 1220×907 px (aspect ratio 1.3452:1).
     Screen hole: left=116, top=107, w=795, h=588
       → left=9.51%, top=11.80%, w=65.16%, h=64.83%  (% of image dims)
     Knob 1 (CH):  center 90.7% x, 16.0% y
     Knob 2 (VOL): center 89.0% x, 38.6% y
  ─────────────────────────────────────────────────────────────────── */
  .tv-container {
    position: relative;
    width: min(740px, 96vw);
    aspect-ratio: 1220 / 907;
  }

  /* ── SCREEN AREA (sits behind TV overlay) ── */
  .screen-area {
    position: absolute;
    left: 9.51%;
    top: 11.80%;
    width: 65.16%;
    height: 64.83%;
    z-index: 1;
    overflow: hidden;
    cursor: pointer;
    border-radius: 3%;
    background: #000;
  }

  #static-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* YouTube wrapper — zoom in to crop YouTube chrome + fill screen tighter */
  #yt-wrapper {
    position: absolute;
    top: -38%;
    left: -21%;
    width: 148%;
    height: 176%;
    display: none;
    pointer-events: none;
  }
  #yt-wrapper iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Scanlines */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.22) 2px,
      rgba(0,0,0,0.22) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Vignette */
  .screen-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 90% 85% at 50% 50%,
      transparent 45%,
      rgba(0,0,0,0.4) 78%,
      rgba(0,0,0,0.75) 100%
    );
    pointer-events: none;
    z-index: 6;
  }

  /* Reflection */
  .screen-reflection {
    position: absolute;
    top: 3px;
    left: 5px;
    width: 36%;
    height: 42%;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.06) 0%,
      rgba(255,255,255,0.02) 50%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 7;
    filter: blur(2px);
  }

  /* Volume OSD */
  #volume-osd {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #volume-osd .vol-label {
    font-family: 'VT323', monospace;
    font-size: clamp(12px, 2vw, 16px);
    color: var(--text-green);
    display: block;
    margin-bottom: 3px;
    letter-spacing: 1px;
  }
  .vol-bars { display: flex; gap: 3px; align-items: flex-end; }
  .vol-bar {
    width: clamp(4px, 0.8vw, 8px);
    background: #1a3a1a;
    border-radius: 2px 2px 0 0;
    transition: background 0.1s;
  }
  .vol-bar.active {
    background: var(--text-green);
    box-shadow: 0 0 4px rgba(0,255,68,0.5);
  }

  /* Channel flash overlay */
  #ch-flash {
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 12;
  }

  /* Power-off line */
  #power-line {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 3px;
    background: white;
    transform: translateY(-50%) scaleX(0);
    opacity: 0;
    pointer-events: none;
    z-index: 13;
    box-shadow: 0 0 12px white, 0 0 24px white;
    border-radius: 2px;
  }

  /* ── TV IMAGE OVERLAY (on top of everything in container) ── */
  .tv-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 20;
    pointer-events: none;
    display: block;
    image-rendering: -webkit-optimize-contrast;
  }

  /* ── INTERACTIVE HIT ZONES ─────────────────────────────────────────
     TV.png is 1220×907 px.

     CH knob:  center (1107, 145), radius 88px
       left  = (1107-88)/1220 = 83.5%   width  = 176/1220 = 14.4%
       top   = (145-88)/907  =  6.3%   height = 176/907  = 19.4%

     VOL knob: center (1086, 350), radius 92px
       left  = (1086-92)/1220 = 81.5%   width  = 184/1220 = 15.1%
       top   = (350-92)/907   = 28.4%   height = 184/907  = 20.3%
  ─────────────────────────────────────────────────────────────────── */
  .knob-zone {
    position: absolute;
    border-radius: 50%;
    cursor: pointer;
    z-index: 15;
    background: transparent;
    transition: background 0.15s;
  }
  .knob-zone:hover  { background: rgba(255,200,80,0.09); box-shadow: 0 0 14px rgba(255,180,40,0.25); }
  .knob-zone:active { background: rgba(255,200,80,0.18); }

  /* Hover label */
  .knob-zone::after {
    content: attr(data-label);
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'VT323', monospace;
    font-size: 12px;
    color: rgba(255,180,80,0.7);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .knob-zone:hover::after { opacity: 1; }

  /* CH knob — invisible hit zone kept for hover label */
  #ch-knob  { left: 83.5%; top: 6.3%;  width: 14.4%; height: 19.4%; }

  /* Channel button image */
  #ch-button-img {
    position: absolute;
    left: 90.7%;
    top: 16.0%;
    width: 13.5%;
    aspect-ratio: 1;
    transform: translate(-50%, -50%) rotate(0deg);
    transform-origin: center center;
    transition: transform 0.45s cubic-bezier(0.34, 1.3, 0.64, 1);
    z-index: 25;
    cursor: pointer;
    pointer-events: all;
    user-select: none;
    -webkit-user-drag: none;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  }
  #ch-button-img:hover {
    filter: drop-shadow(0 2px 10px rgba(255,200,80,0.5));
  }

  /* VOL knob */
  #vol-knob { left: 81.5%; top: 28.4%; width: 15.1%; height: 20.3%; }

  /* Power zone — positioned over the button beside MYOLDTV logo */
  #power-zone {
    position: absolute;
    left: 80%;
    top: 89%;
    width: 6%;
    height: 9%;
    z-index: 25;
    cursor: pointer;
    background: transparent;
    border-radius: 50%;
    transition: background 0.15s;
  }
  #power-zone:hover  { background: rgba(255,255,255,0.08); }
  #power-zone:active { background: rgba(255,255,255,0.18); }

  /* Power LED — hidden, power state shown by screen */
  #power-led { display: none; }

  /* ── SHELF ── */
  .shelf {
    width: min(880px, 115vw);
    height: 22px;
    background: linear-gradient(180deg, #7a5530 0%, #5a3d1e 40%, #3d2810 100%);
    border-radius: 0 0 6px 6px;
    box-shadow:
      0 8px 24px rgba(0,0,0,0.7),
      0 3px 6px rgba(0,0,0,0.5),
      inset 0 2px 4px rgba(255,200,100,0.15);
    position: relative;
    flex-shrink: 0;
  }
  .shelf::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(255,200,120,0.3) 20%, rgba(255,200,120,0.5) 50%, rgba(255,200,120,0.3) 80%, transparent);
  }

  /* Responsive */
  @media (max-width: 600px) {
    #keyboard-hints { display: none; }
    #power-hint { font-size: 15px; }
  }
</style>
</head>
<body>

<div id="ambient-glow"></div>

<div id="keyboard-hints">
  SPACE — power<br>
  ↑↓ — seek<br>
  ←→ — volume
</div>

<div id="power-hint">▶ CLICK TV OR PRESS SPACE TO START</div>

<div class="scene">
  <div class="tv-container" id="tv-container">

    <!-- ① Video/static layer — behind TV image -->
    <div class="screen-area" id="screen-area">
      <canvas id="static-canvas"></canvas>
      <div id="yt-wrapper">
        <div id="yt-player"></div>
      </div>
      <div class="scanlines"></div>
      <div class="screen-vignette"></div>
      <div class="screen-reflection"></div>

      <div id="volume-osd">
        <span class="vol-label">VOL</span>
        <div class="vol-bars" id="vol-bars"></div>
      </div>

      <div id="ch-flash"></div>
      <div id="power-line"></div>
    </div>

    <!-- ② TV.png overlay — the physical TV image on top -->
    <img src="BRAND ASSETS/TV.png" class="tv-image" alt="Retro TV" draggable="false">

    <!-- ③ Interactive hit zones -->
    <div class="knob-zone" id="ch-knob"
         data-label="SEEK  ▲ / ▼"
         title="Left-click: +30s  |  Right-click: −30s"></div>

    <!-- Channel dial button image — spins on seek -->
    <img id="ch-button-img"
         src="BRAND ASSETS/channel_button.png"
         alt="Channel dial"
         draggable="false"
         title="Left-click: +30s  |  Right-click: −30s">

    <div class="knob-zone" id="vol-knob"
         data-label="VOL  ▲ / ▼"
         title="Left-click: Vol+  |  Right-click: Vol−"></div>

    <div id="power-zone" title="Power (Space)"></div>

    <!-- ④ Power LED — above TV image -->
    <div id="power-led"></div>

  </div>

  <div class="shelf"></div>
</div>

<script>
(function () {
  'use strict';

  const VIDEO_ID  = 'pQ2jtyVKWhc';
  const SEEK_STEP = 30; // seconds per knob click

  // ── STATE ────────────────────────────────────────────────────────────────
  let isPowered   = false;
  let volume      = 7;
  let staticAnimId = null;
  let volTimer    = null;
  let player      = null;
  let playerReady = false;

  // ── DOM ──────────────────────────────────────────────────────────────────
  const canvas        = document.getElementById('static-canvas');
  const ctx           = canvas.getContext('2d');
  const ytWrapper     = document.getElementById('yt-wrapper');
  const screenArea    = document.getElementById('screen-area');
  const chKnob        = document.getElementById('ch-knob');
  const chButtonImg   = document.getElementById('ch-button-img');
  const volKnob       = document.getElementById('vol-knob');
  const powerZone     = document.getElementById('power-zone');
  const powerLed      = document.getElementById('power-led');
  const chFlash       = document.getElementById('ch-flash');
  const powerLine     = document.getElementById('power-line');
  const volumeOsd     = document.getElementById('volume-osd');
  const volBarsEl     = document.getElementById('vol-bars');
  const ambientGlow   = document.getElementById('ambient-glow');
  const powerHint     = document.getElementById('power-hint');

  // ── VOLUME BARS INIT ─────────────────────────────────────────────────────
  const VOL_MAX = 10;
  for (let i = 0; i < VOL_MAX; i++) {
    const bar = document.createElement('div');
    bar.className = 'vol-bar';
    bar.style.height = (8 + i * 3) + 'px';
    volBarsEl.appendChild(bar);
  }

  function updateVolBars() {
    volBarsEl.querySelectorAll('.vol-bar').forEach((b, i) => {
      b.classList.toggle('active', i < volume);
    });
  }

  // ── STATIC NOISE ─────────────────────────────────────────────────────────
  function resizeCanvas() {
    canvas.width  = canvas.offsetWidth  || canvas.parentElement.offsetWidth;
    canvas.height = canvas.offsetHeight || canvas.parentElement.offsetHeight;
  }

  function drawStatic() {
    resizeCanvas();
    const w = canvas.width, h = canvas.height;
    if (!w || !h) { staticAnimId = requestAnimationFrame(drawStatic); return; }
    const img = ctx.createImageData(w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255 | 0;
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = Math.random() > 0.05 ? 180 : 40;
    }
    ctx.putImageData(img, 0, 0);
    staticAnimId = requestAnimationFrame(drawStatic);
  }

  function startStatic() {
    canvas.style.display = 'block';
    if (!staticAnimId) drawStatic();
  }

  function stopStatic() {
    if (staticAnimId) { cancelAnimationFrame(staticAnimId); staticAnimId = null; }
    canvas.style.display = 'none';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // ── YOUTUBE IFrame API ────────────────────────────────────────────────────
  (function loadYTApi() {
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();

  window.onYouTubeIframeAPIReady = function () { /* ready — player created on first power on */ };

  function initPlayer() {
    if (player) {
      // Already created — just show and resume
      ytWrapper.style.display = 'block';
      if (playerReady) {
        try { player.playVideo(); } catch(_) {}
        stopStatic();
      }
      return;
    }

    player = new YT.Player('yt-player', {
      videoId: VIDEO_ID,
      playerVars: {
        autoplay: 1,
        controls: 0,
        rel: 0,
        disablekb: 1,
        iv_load_policy: 3,
        modestbranding: 1,
        playsinline: 1,
      },
      events: {
        onReady: function (e) {
          playerReady = true;
          const iframe = e.target.getIframe();
          iframe.style.width  = '100%';
          iframe.style.height = '100%';
          iframe.style.border = 'none';
          ytWrapper.style.display = 'block';
          e.target.playVideo();
          // Seek to a random point once duration is available
          setTimeout(() => {
            try {
              const dur = e.target.getDuration();
              if (dur > 60) e.target.seekTo(Math.random() * dur * 0.85, true);
            } catch(_) {}
          }, 1200);
          stopStatic();
        },
        onError: function () {
          startStatic();
        }
      }
    });
  }

  // ── OSD ───────────────────────────────────────────────────────────────────
  function showVolumeOsd() {
    updateVolBars();
    volumeOsd.style.opacity = '1';
    if (volTimer) clearTimeout(volTimer);
    volTimer = setTimeout(() => { volumeOsd.style.opacity = '0'; }, 2600);
  }

  // ── AUDIO ─────────────────────────────────────────────────────────────────
  let audioCtx = null;

  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function makeNoise(actx, duration) {
    const len  = actx.sampleRate * duration;
    const buf  = actx.createBuffer(1, len, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const src = actx.createBufferSource();
    src.buffer = buf;
    return src;
  }

  function playTurnOnSound() {
    const actx = getAudio();
    const dur = 1.1;
    const noise  = makeNoise(actx, dur);
    const filter = actx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(200,  actx.currentTime);
    filter.frequency.linearRampToValueAtTime(3500, actx.currentTime + dur * 0.6);
    filter.Q.value = 0.7;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0,    actx.currentTime);
    gain.gain.linearRampToValueAtTime(0.55, actx.currentTime + 0.08);
    gain.gain.linearRampToValueAtTime(0.3,  actx.currentTime + dur * 0.7);
    gain.gain.linearRampToValueAtTime(0,    actx.currentTime + dur);
    noise.connect(filter); filter.connect(gain); gain.connect(actx.destination);
    noise.start(); noise.stop(actx.currentTime + dur);

    const hum = actx.createOscillator();
    const humGain = actx.createGain();
    hum.type = 'sawtooth';
    hum.frequency.value = 60;
    humGain.gain.setValueAtTime(0,    actx.currentTime);
    humGain.gain.linearRampToValueAtTime(0.08, actx.currentTime + dur * 0.5);
    humGain.gain.linearRampToValueAtTime(0,    actx.currentTime + dur);
    hum.connect(humGain); humGain.connect(actx.destination);
    hum.start(); hum.stop(actx.currentTime + dur);
  }

  function playTurnOffSound() {
    const actx = getAudio();
    const dur = 0.6;
    const noise  = makeNoise(actx, dur);
    const filter = actx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(3000, actx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(300, actx.currentTime + dur);
    filter.Q.value = 0.6;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.5,   actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    noise.connect(filter); filter.connect(gain); gain.connect(actx.destination);
    noise.start(); noise.stop(actx.currentTime + dur);

    const whine = actx.createOscillator();
    const whineGain = actx.createGain();
    whine.type = 'sine';
    whine.frequency.setValueAtTime(14000, actx.currentTime);
    whine.frequency.exponentialRampToValueAtTime(80, actx.currentTime + dur * 1.5);
    whineGain.gain.setValueAtTime(0.12,  actx.currentTime);
    whineGain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur * 1.5);
    whine.connect(whineGain); whineGain.connect(actx.destination);
    whine.start(); whine.stop(actx.currentTime + dur * 1.5);
  }

  // ── POWER ─────────────────────────────────────────────────────────────────
  function powerOn() {
    isPowered = true;
    powerLed.classList.add('on');
    ambientGlow.classList.add('active');
    powerHint.style.display = 'none';
    playTurnOnSound();
    startStatic();
    setTimeout(() => {
      if (window.YT && window.YT.Player) {
        initPlayer();
      } else {
        window.onYouTubeIframeAPIReady = initPlayer;
      }
    }, 1100);
  }

  function powerOff() {
    isPowered = false;
    powerLed.classList.remove('on');
    ambientGlow.classList.remove('active');
    if (player && playerReady) {
      try { player.pauseVideo(); } catch(_) {}
    }
    ytWrapper.style.display = 'none';
    volumeOsd.style.opacity  = '0';

    playTurnOffSound();
    startStatic();
    setTimeout(() => {
      stopStatic();
      powerLine.style.transition = 'none';
      powerLine.style.opacity    = '1';
      powerLine.style.transform  = 'translateY(-50%) scaleX(1)';
      setTimeout(() => {
        powerLine.style.transition = 'transform 0.5s cubic-bezier(0.55,0,1,1), opacity 0.5s 0.4s';
        powerLine.style.transform  = 'translateY(-50%) scaleX(0)';
        powerLine.style.opacity    = '0';
      }, 40);
    }, 300);
  }

  function togglePower() {
    if (isPowered) powerOff(); else powerOn();
  }

  // ── SEEK ──────────────────────────────────────────────────────────────────
  let chRotation = 0;

  function spinChButton() {
    chRotation += 15;
    chButtonImg.style.transform = 'translate(-50%, -50%) rotate(' + chRotation + 'deg)';
  }

  function seek(dir) {
    spinChButton();
    if (!isPowered || !player || !playerReady) return;
    try {
      const current  = player.getCurrentTime();
      const duration = player.getDuration();
      player.seekTo(Math.max(0, Math.min(duration, current + dir * SEEK_STEP)), true);
    } catch(_) {}
  }

  // ── VOLUME ────────────────────────────────────────────────────────────────
  function changeVolume(dir) {
    volume = Math.max(0, Math.min(VOL_MAX, volume + dir));
    showVolumeOsd();
    pulseKnob(volKnob, dir);
  }

  // ── KNOB FEEDBACK ─────────────────────────────────────────────────────────
  function pulseKnob(el, dir) {
    el.style.transition = 'background 0.05s';
    el.style.background = dir > 0
      ? 'rgba(255,200,80,0.18)'
      : 'rgba(100,180,255,0.15)';
    setTimeout(() => { el.style.background = 'transparent'; }, 200);
  }

  // ── EVENTS ────────────────────────────────────────────────────────────────
  powerZone.addEventListener('click', togglePower);
  screenArea.addEventListener('click', () => { if (!isPowered) powerOn(); });

  chButtonImg.addEventListener('click',       (e) => { e.preventDefault(); seek(1); });
  chButtonImg.addEventListener('contextmenu', (e) => { e.preventDefault(); seek(-1); });

  volKnob.addEventListener('click',       (e) => { e.preventDefault(); changeVolume(1); });
  volKnob.addEventListener('contextmenu', (e) => { e.preventDefault(); changeVolume(-1); });

  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case ' ':          e.preventDefault(); togglePower();    break;
      case 'ArrowUp':    e.preventDefault(); seek(1);          break;
      case 'ArrowDown':  e.preventDefault(); seek(-1);         break;
      case 'ArrowRight': e.preventDefault(); changeVolume(1);  break;
      case 'ArrowLeft':  e.preventDefault(); changeVolume(-1); break;
    }
  });

  // ── INIT ──────────────────────────────────────────────────────────────────
  updateVolBars();
  canvas.style.display = 'none';

})();
</script>
</body>
</html>
